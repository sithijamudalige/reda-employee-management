{% extends 'base.html' %}
{% block content %}

<h2>Assign Workplace - {{ member.fullname }}</h2>

<form method="post" class="mt-3">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label">Workplace</label>
    <input type="text" name="workplace" class="form-control" value="{{ member.workplace }}">
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{% url 'member_list' %}" class="btn btn-secondary ms-2">Cancel</a>
</form>

{% endblock %}
